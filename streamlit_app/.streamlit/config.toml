# .streamlit/config.toml
[theme]
# Primary accent color (Trustworthy Medical Blue)
primaryColor="#0072B5"

# Main background color (Clean White)
backgroundColor="#FFFFFF"

# Sidebar and input box background (Very pale cool gray/blue)
secondaryBackgroundColor="#F0F2F6"

# Standard text color (Dark gray for readability)
textColor="#262730"

# Font family
font="sans serif"
[server]
enableCORS=false
